name: Lint

# Mirrors the Node-version matrix + action versions used in
# `Frontend-index/.github/workflows/ci.yml` and
# `Frontend-auth/.github/workflows/ci.yml`. Differences:
#
#   - Docs has no application to build, test, or e2e — only Markdown
#     validation. So the workflow is one job, four steps.
#
#   - No NPM_TOKEN / registry-url / scope. The docs repo has no
#     `@nimbusnexus/*` private deps; only public packages from the
#     npm registry. Adding the GitHub registry config here would just
#     be cargo-cult.
#
#   - Same `24.15.0` floor + `current` canary pattern as the other
#     frontends — gives early warning on upstream tooling breakage
#     (markdownlint, gray-matter, lychee) before we bump the floor.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    # ─── Node version matrix ──────────────────────────────────────────
    # Same pattern as Frontend-auth / Frontend-index: pinned floor as
    # the required leg, `current` as a canary that surfaces upcoming
    # tooling breakage without blocking merges.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["24.15.0", "current"]
        include:
          - node-version: "24.15.0"
            required: true
          - node-version: "current"
            required: false
    continue-on-error: ${{ !matrix.required }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit dependencies
        # Fail on high/critical advisories. `--omit=dev` keeps dev-only
        # tooling vulns out of the gate (we surface those via
        # Dependabot instead) so a markdownlint CVE doesn't block a
        # typo-fix PR.
        run: npm audit --omit=dev --audit-level=high

      - name: Markdown lint
        run: npm run lint:markdown

      - name: Frontmatter validation
        run: npm run lint:frontmatter

      - name: Placeholder validation
        run: npm run lint:placeholders

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          # Lychee config:
          #
          # --base https://nimbusnexus.net
          #   Gives lychee a host so root-relative paths like
          #   /docs/api/vms parse as URLs. Without this, lychee errors
          #   ("Cannot convert path '/docs/...' to a URI") BEFORE any
          #   --exclude pattern is applied — so excludes that target
          #   /docs/ never get a chance to fire.
          #
          # --exclude '^https?://(www\.)?nimbusnexus\.net'
          #   Skip our own domain. Internal cross-references (/docs/*,
          #   /resources/*, /contact/*) are validated by the frontend's
          #   render path via the docs manifest — that's the
          #   authoritative check. Re-checking via HTTP from here just
          #   races deploys: a docs PR can legitimately add a link to a
          #   page that won't exist until the same PR ships.
          #
          # --exclude '\{\{[A-Z_]+\}\}'
          #   Skip placeholder URLs like `{{API_BASE_URL}}/v1/vms`.
          #   These are interpolated at render time by
          #   `docsPlaceholders.ts` in the frontend; in the raw .md
          #   they're literal strings that lychee can't and shouldn't
          #   resolve.
          #
          # Everything else (github.com, creativecommons.org, etc.) is
          # checked — that's where this step earns its keep, catching
          # bit-rot on third-party links.
          args: >-
            --no-progress
            --base https://nimbusnexus.net
            --exclude '^https?://(www\.)?nimbusnexus\.net'
            --exclude '\{\{[A-Z_]+\}\}'
            'content/**/*.md'
          fail: true
